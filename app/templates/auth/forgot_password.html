{% extends "base.html" %}

{% block content %}
<h1>Forgot password</h1>

<form method="post" novalidate>
    {{ form.hidden_tag() }}
    <p>
        {{ form.email.label }}<br>
        {{ form.email(size=32) }}
        {% for error in form.email.errors %}
        <span>{{ error }}</span>
        {% endfor %}
    </p>
    <p>{{ form.next() }}</p>
    {% endblock %}
