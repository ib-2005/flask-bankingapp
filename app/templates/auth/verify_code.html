{% extends "base.html" %}

{% block content %}
<h1>Verify code</h1>

<form method="post" novalidate>
    {{ form.hidden_tag() }}
    <p>
        {{ form.code.label }}<br>
        {{ form.code(size=32) }}
        {% for error in form.code.errors %}
        <span>{{ error }}</span>
        {% endfor %}
    </p>
    <p>{{ form.submit() }}</p>
    {% endblock %}
